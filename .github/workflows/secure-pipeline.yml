name: Secure CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Secrets Scan
      - name: Run Gitleaks Scan
        uses: zricethezav/gitleaks-action@v2

      # 3. SAST (Semgrep) → FAIL FAST
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        env:
          SEMGREP_RULES: auto
        continue-on-error: false

      # 4. Dependency Scan (Trivy FS) → FAIL FAST (LODASH WILL TRIGGER)
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'        # 🔥 THIS IS IMPORTANT
          severity: 'CRITICAL,HIGH'

      # 5. Build Docker Image (WILL NOT RUN IF ABOVE FAILS)
      - name: Build Docker Image
        run: docker build -t secure-app .

      # 6. Image Scan → FAIL FAST
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # 7. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Push Image (WILL NOT EXECUTE IF FAIL OCCURS)
      - name: Push Image
        run: |
          docker tag secure-app aditya1436/secure-app
          docker push aditya1436/secure-app
